# =============================================================
#  Docker Compose – Get-Your-Hands-Dirty-DE
#  Practice environment  |  NOT for production
# =============================================================
#
#  Quick start
#  -----------
#    docker compose up -d               # start all four databases
#    docker compose up -d mysql         # start only MySQL
#    docker compose logs -f             # follow logs
#    docker compose down                # stop & remove containers
#    docker compose down -v             # also wipe named volumes
#
#  Connection cheat-sheet (all on localhost)
#  -----------------------------------------
#    MySQL       → localhost:3306   user=dev  pass=dev123  db=practice_db
#    PostgreSQL  → localhost:5432   user=dev  pass=dev123  db=practice_db
#    Oracle      → localhost:1521   user=system  pass=dev123  service=XEPDB1
#    Neo4j       → localhost:7474 (browser) / 7687 (bolt)  user=neo4j  pass=dev123
# =============================================================

services:

  # ─────────────────────────────
  #  MySQL 8.4
  # ─────────────────────────────
  mysql:
    build:
      context: .
      dockerfile: docker/mysql.Dockerfile
    container_name: practice-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: practice_db
      MYSQL_USER: dev
      MYSQL_PASSWORD: dev123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────
  #  PostgreSQL 16
  # ─────────────────────────────
  postgresql:
    build:
      context: .
      dockerfile: docker/postgresql.Dockerfile
    container_name: practice-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev123
      POSTGRES_DB: practice_db
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U dev -d practice_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────
  #  Oracle XE 21c (slim)
  #  First startup takes a few
  #  minutes – be patient!
  # ─────────────────────────────
  oracle:
    build:
      context: .
      dockerfile: docker/oracle.Dockerfile
    container_name: practice-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: dev123
      ORACLE_DATABASE: PRACTICE
    ports:
      - "1521:1521"
      - "5500:5500" # Oracle Enterprise Manager Express (optional)
    volumes:
      - oracle_data:/opt/oracle/oradata
    # Oracle initialises slowly on first run – give it plenty of time
    healthcheck:
      test: [ "CMD-SHELL", "healthcheck.sh" ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─────────────────────────────
  #  Neo4j 5 (Community)
  # ─────────────────────────────
  neo4j:
    build:
      context: .
      dockerfile: docker/neo4j.Dockerfile
    container_name: practice-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/dev123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    ports:
      - "7474:7474" # Neo4j Browser (HTTP)
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

# ─────────────────────────────
#  Named Volumes
# ─────────────────────────────
volumes:
  mysql_data:
  postgresql_data:
  oracle_data:
  neo4j_data:
  neo4j_logs:
